# =============================================================================
#  robot.linux.cfg
#  Ubuntu / Linux 下的示例配置. 用法:
#      cp linux/robot.linux.cfg robot.cfg
#      # 或者直接传给程序:
#      ./build_linux/bin/11_multi_joint_control linux/robot.linux.cfg
#
#  与 robot.cfg 唯一的差别: port 注释里推荐 Linux 路径.
#  其它字段 (motor_ids / pos_unit / limits / control_rate_hz / ...) 跟 robot.cfg
#  完全一致, 改一份即可.
# =============================================================================

# ---- 串口 / 调试板 ----
# port:
#   auto                          → 自动扫描 USB 串口 (推荐, 拔插换口都能用)
#   /dev/ttyUSB0                  → 指定具体端口 (没装 udev 规则时)
#   /dev/panthera_debug_board     → 用 udev 软链 (推荐, 装了 setup_udev.sh 之后)
#   /dev/serial/by-id/usb-...     → 用内核固定路径 (ls /dev/serial/by-id 查全名)
#
# 程序启动时会列出所有 USB 串口供参考.
# 如果是物理 Ubuntu 机器, 第一次插上调试板:
#   1) lsusb              # 看 ID 字段, 确认 VID 在 99-panthera-debug-board.rules 里
#   2) ls /dev/ttyUSB*    # 看分配到哪个 ttyUSBx
#   3) (推荐) bash linux/setup_udev.sh  # 后续可以用 /dev/panthera_debug_board
port      = auto
baudrate  = 4000000

# ---- 关节列表 ----
motor_ids = 1, 2, 3, 4, 5, 6, 7

# ---- 位置单位 (turns / radians / degrees) ----
pos_unit  = degrees

# ---- 各关节软限位 (单位 = pos_unit, 这里是"度") ----
# 注意: 这些是示例值, 第一次接新机械臂请用 14_set_limits 重新标定!
limits.1   = -140.6880, 148.1400
limits.2   = 0.0000   , 91.9440
limits.3   = -0.0360  , 176.9760
limits.4   = -124.9560, 90.9720
limits.5   = -87.2280 , 72.9720
limits.6   = -95.0040 , 90.5400
limits.7   = -114.9840, -1.8360

# =============================================================================
# 高频控制环参数 (11_multi_joint_control 用)
# =============================================================================

# 控制频率. Linux 上即使没装 PREEMPT_RT 内核, 普通 Ubuntu 也能稳跑 250Hz.
# 如果跑 500Hz 出现 max_jitter > 周期 30%, 请:
#   - 配合 linux/run_rt.sh 跑 (SCHED_FIFO + CPU affinity)
#   - 关闭桌面合成器 / 浏览器等 CPU hog
#   - 把内核 cmdline 里加 isolcpus=N 隔离一个核给控制环
control_rate_hz = 250

# 一拖多 (CAN ID 0x8090) 发送时的 tqe_raw. 0 = 用电机默认最大力矩.
max_torque_raw  = 0

# 异步 RX 线程 (推荐保持 true)
use_async_rx    = true

# 单次目标的运动时长 (秒)
trajectory_dt_s = 4.0
