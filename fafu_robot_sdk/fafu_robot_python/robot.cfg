# =============================================================================
#  robot.cfg
#  motor_example_debug 配置示例 (INI / key=value 格式)
#
#  - 注释: 以 '#' 或 ';' 开头 (整行或行尾)
#  - 字符串/整数: key = value
#  - 列表:       key = 1,2,3 (逗号或空格分隔)
#  - 单位制选择: pos_unit = turns / radians / degrees
#                 之后所有 limits.* 都按这个单位填写, 解析时自动归一为"圈"
#  - 限位:       limits.<motor_id> = <lo>, <hi>
#
#  程序里这样用:
#      auto cfg = RobotConfig::load("robot.cfg");
#      HightorqueSerial ht(cfg.port, cfg.baudrate);
#      cfg.apply_limits_to(ht);   # 一行把所有限位灌进 driver
#      ht.set_pos_vel_acc(2, 0.3, 0.05, 0.05, cfg.pos_unit);
# =============================================================================

# ---- 串口 / 调试板 ----
# port:
#   auto      → 自动扫描 USB 串口 (推荐, 换 USB 口/重启电脑也能用)
#   COM14     → 指定具体端口 (Windows)
#   /dev/ttyUSB0 → 指定具体端口 (Linux)
# 程序启动时会列出所有 USB 串口供参考. 如有多个调试板, 写具体端口区分.
port      = auto
baudrate  = 4000000

# ---- 关节列表 ----
motor_ids = 1, 2, 3, 4, 5, 6, 7

# ---- 位置单位 (turns / radians / degrees) ----
# 11_multi_joint_control 的用户接口 (输入 / 显示 / 限位) 全部走"度".
# 解析时 RobotConfig::load 内部仍归一为"圈" (协议原生), 不影响下层.
pos_unit  = degrees

# ---- 各关节软限位 (按上面 pos_unit 的单位; 这里是"度") ----
# 与之前 radians 配置机械意义等价:
#   limits.1: -3.1416 rad  →  -180.00 度
#            +0.0390 rad  →    +2.23 度
#   limits.3:  0.0000 rad  →     0.00 度
#            +0.4700 rad  →   +26.93 度
#   limits.4-7: ±0.25 rad  →  ±14.32 度
limits.1   = -140.6880, 148.1400 
limits.2   = 0.0000   , 91.9440  
limits.3   = -0.0360  , 176.9760 
# J4 (motor 4) soft-limit widened back for larger reachable workspace.
# (Keep this in sync with wrs PantheraHT joint-4 motion_range.)
limits.4   = -124.9560, 90.9720  
limits.5   = -87.2280 , 72.9720  
limits.6   = -95.0040 , 90.5400  
limits.7   = -114.9840, -1.8360  

# =============================================================================
# 高频控制环参数 (11_multi_joint_control 用)
# =============================================================================

# 目标控制频率 (Hz).
#   100 Hz  = 兼容/最稳, jitter 通常 < 1ms
#   200~300 Hz = 推荐 (周期 3-5ms; 配 S 曲线插值, 体感非常顺滑)
#   500 Hz  = 极限 (周期 2ms, 与 set_many 单次耗时同量级; max_jitter 易飙到 5ms+)
# 选择参考: 启动后看 stats 里 max_jitter, 长期 < 周期的 30% 算稳定.
# 250 Hz + 4Mbps 串口 + 7 电机一拖多, 实测 max_jitter < 1.5ms, 是甜蜜点.
control_rate_hz = 250

# 一拖多 (CAN ID 0x8090) 发送时的 tqe_raw (int16).
#   0      = "用电机默认最大力矩" (内部转 NAN_INT16=0x8000) — 推荐, 让电机充分发力
#   非 0   = 显式力矩上限 (LSB 因电机型号而异, 见协议文档 2.3 节)
# 注意: 以前误以为 0=不限制, 实际是 "力矩限制=0 ⇒ 没力气, 不动, 还会触发 mode 自复位".
max_torque_raw  = 0

# 是否启用异步 RX 线程 (true=100Hz 模式, false=同步串行旧模式)
use_async_rx    = true

# 单次目标的运动时长 (秒). 100Hz 下 4.0s = 400 个 tick.
trajectory_dt_s = 4.0
