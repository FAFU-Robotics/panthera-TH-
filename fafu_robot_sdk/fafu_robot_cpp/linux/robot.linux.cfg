# =============================================================================
#  robot.linux.cfg
#  Ubuntu / Linux 下的示例配置 (fafu_robot_sdk 新版).
#
#  用法:
#      # 方案 A: 覆盖 fafu_robot_python/robot.cfg (POST_BUILD 会自动 copy 到 exe 旁)
#      cp linux/robot.linux.cfg ../fafu_robot_python/robot.cfg
#
#      # 方案 B: 单独传给 native 例程
#      ./build_linux/bin/02_move_j linux/robot.linux.cfg
#
#      # 方案 C: 装 udev 规则后, 改一行 port 就够了
#      bash linux/setup_udev.sh
#      sed -i 's|^port.*|port = /dev/panthera_debug_board|' ../fafu_robot_python/robot.cfg
#
#  与旧版 robot.cfg 的差异: 只是 port 注释里推荐 Linux 路径 + limits 更新到 fafu 现值.
# =============================================================================

# ---- 串口 / 调试板 ----
# port:
#   auto                          → 自动扫描 USB 串口 (推荐)
#   /dev/ttyUSB0                  → 指定具体端口 (没装 udev 规则时)
#   /dev/panthera_debug_board     → 用 udev 软链 (推荐, setup_udev.sh 装好后可用)
#   /dev/serial/by-id/usb-...     → 内核固定路径 (ls /dev/serial/by-id 查全名)
port      = auto
baudrate  = 4000000

# ---- 关节列表 ----
motor_ids = 1, 2, 3, 4, 5, 6, 7

# ---- 位置单位 (turns / radians / degrees) ----
pos_unit  = degrees

# ---- 各关节软限位 (单位 = pos_unit, 这里是"度") ----
# 与 fafu_robot_python/robot.cfg 保持一致; 第一次接新机械臂建议用 14_set_limits (旧 SDK)
# 或 wrs PantheraHT 的 joint motion_range 交叉校核.
limits.1   = -140.6880, 148.1400
limits.2   = 0.0000   , 180.0000
limits.3   = -0.0360  , 205.0000
# J4 (motor 4) 已放宽; 与 wrs PantheraHT joint-4 motion_range 保持同步.
limits.4   = -124.9560, 90.9720
limits.5   = -87.2280 , 72.9720
limits.6   = -95.0040 , 90.5400
limits.7   = 0, 105

# ---- 夹爪最大力矩 (fafu 新字段) ----
# 走 set_pos_vel_tqe 时的力矩上限, 原始 int16. LSB 因电机型号而异
# (M4438_30 coeff ≈ 0.5256, 即 1 raw ≈ 0.0053 Nm). 300 ≈ 1.6 Nm.
# 底层 RobotConfig 会忽略此字段, 只有 Python 交互脚本 / SDK 上层用.
gripper_max_torque_raw = 300

# =============================================================================
# 高频控制环参数
# =============================================================================

# 目标控制频率 (Hz).
# 普通 Ubuntu (无 PREEMPT_RT) 250Hz 也能稳跑. 500Hz 建议:
#   - bash linux/run_rt.sh 04_servo_j   (SCHED_FIFO)
#   - 关掉桌面合成器/浏览器等 CPU hog
#   - CPU governor 调 performance
control_rate_hz = 250

# 一拖多 (CAN ID 0x8090) 发送时的 tqe_raw. 0 = 用电机默认最大力矩.
max_torque_raw  = 0

# 异步 RX 线程 (推荐 true)
use_async_rx    = true

# 单次目标的运动时长 (秒)
trajectory_dt_s = 4.0
